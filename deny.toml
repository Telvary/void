# cargo-deny configuration for void-cli
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# bincode 2.x is pulled transitively via wa-rs and marked unmaintained.
# No in-tree fix; tracked upstream.
ignore = ["RUSTSEC-2025-0141"]

[licenses]
confidence-threshold = 0.8

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSD-1-Clause",
    "BSL-1.0",
    "ISC",
    "Unlicense",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "LGPL-2.1-or-later",
    "AGPL-3.0-only",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "allow"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
