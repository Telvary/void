name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. 0.3.2)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: void-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: void-darwin-amd64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: void-linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: void-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: void-windows-amd64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ${{ matrix.artifact }}.tar.gz void
          mv ${{ matrix.artifact }}.tar.gz ../../../

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ReleaseDir = "target/${{ matrix.target }}/release"
          $Binary = Join-Path $ReleaseDir "void.exe"
          $Archive = "${{ matrix.artifact }}.zip"
          Compress-Archive -Path $Binary -DestinationPath $Archive -Force

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*
          retention-days: 1

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract changelog
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md > /tmp/release-notes.md
          echo "--- Release notes ---"
          cat /tmp/release-notes.md

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"

          if gh release view "$TAG" &>/dev/null; then
            gh release edit "$TAG" --title "v${TAG}" --notes-file /tmp/release-notes.md
            gh release upload "$TAG" artifacts/* --clobber
          else
            gh release create "$TAG" artifacts/* --title "v${TAG}" --notes-file /tmp/release-notes.md
          fi

  homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Update formula in MaximeGaudin/homebrew-tap
        env:
          # SSH private key of a read-write deploy key scoped to
          # MaximeGaudin/homebrew-tap. If unset, this step no-ops so the
          # release never fails for lack of it.
          TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_DEPLOY_KEY:-}" ]; then
            echo "::warning::HOMEBREW_TAP_DEPLOY_KEY not set — skipping Homebrew tap update."
            echo "Add a read-write deploy key for MaximeGaudin/homebrew-tap to auto-publish."
            exit 0
          fi

          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$TAP_DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"

          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          ARM_SHA=$(sha256sum artifacts/void-darwin-arm64.tar.gz | cut -d' ' -f1)
          AMD_SHA=$(sha256sum artifacts/void-darwin-amd64.tar.gz | cut -d' ' -f1)

          git clone --depth 1 git@github.com:MaximeGaudin/homebrew-tap.git tap
          mkdir -p tap/Formula
          cat > tap/Formula/void.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          # Auto-generated by the void release workflow. Do not edit by hand.
          class Void < Formula
            desc "One inbox for everything — unified messaging CLI"
            homepage "https://github.com/MaximeGaudin/void"
            version "${VERSION}"
            license "AGPL-3.0-only"

            on_macos do
              on_arm do
                url "https://github.com/MaximeGaudin/void/releases/download/${TAG}/void-darwin-arm64.tar.gz"
                sha256 "${ARM_SHA}"
              end
              on_intel do
                url "https://github.com/MaximeGaudin/void/releases/download/${TAG}/void-darwin-amd64.tar.gz"
                sha256 "${AMD_SHA}"
              end
            end

            def install
              bin.install "void"
            end

            test do
              assert_match "void", shell_output("#{bin}/void --version")
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/void.rb
          git commit -m "void ${VERSION}" || { echo "no formula change"; exit 0; }
          git push
