name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. 0.3.2)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: void-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: void-darwin-amd64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: void-linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: void-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: void-windows-amd64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ${{ matrix.artifact }}.tar.gz void
          mv ${{ matrix.artifact }}.tar.gz ../../../

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ReleaseDir = "target/${{ matrix.target }}/release"
          $Binary = Join-Path $ReleaseDir "void.exe"
          $Archive = "${{ matrix.artifact }}.zip"
          Compress-Archive -Path $Binary -DestinationPath $Archive -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*
          retention-days: 1

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract changelog
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md > /tmp/release-notes.md
          echo "--- Release notes ---"
          cat /tmp/release-notes.md

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"

          if gh release view "$TAG" &>/dev/null; then
            gh release edit "$TAG" --title "v${TAG}" --notes-file /tmp/release-notes.md
            gh release upload "$TAG" artifacts/* --clobber
          else
            gh release create "$TAG" artifacts/* --title "v${TAG}" --notes-file /tmp/release-notes.md
          fi
