name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Fast, no-compile formatting check that fails the pipeline in ~15s when
  # formatting is wrong, so we don't waste cache/runner time on the matrix.
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  check:
    name: Check (${{ matrix.os }})
    needs: fmt
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # Keep cache writes restricted to main to avoid filling the 10 GB
          # GitHub Actions cache quota with short-lived PR branches.
          save-if: ${{ github.ref == 'refs/heads/main' }}
          # Persist cache even when clippy/tests fail so the next run starts
          # warm instead of recompiling everything from scratch.
          cache-on-failure: true

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test
