name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # No debuginfo in CI: tests don't need PDB/DWARF, and dropping it roughly
  # halves the dependency cache and slashes MSVC link time on Windows.
  CARGO_PROFILE_DEV_DEBUG: 0

jobs:
  # Fast, no-compile formatting check that fails the pipeline in ~15s when
  # formatting is wrong, so we don't waste cache/runner time on the matrix.
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  check:
    name: Check (${{ matrix.os }})
    needs: fmt
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS is a release target, so it must be in the matrix — path
        # handling and the ~/Library config fallback only run here.
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # Cache writes are restricted to main to protect the 10 GB quota —
          # except Dependabot PRs, which change Cargo.lock and would otherwise
          # rebuild cold on every push without ever saving.
          save-if: ${{ github.ref == 'refs/heads/main' || github.actor == 'dependabot[bot]' }}
          # Persist cache even when clippy/tests fail so the next run starts
          # warm instead of recompiling everything from scratch.
          cache-on-failure: true

      - name: Clippy
        # Lints are platform-independent; skip the slowest runner. Windows
        # cfg blocks still compile fatally under RUSTFLAGS=-D warnings in
        # the test step — only clippy-specific lints are uncovered there.
        if: matrix.os != 'windows-latest'
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --locked

  # Build against the declared MSRV (currently 1.95) so a dependency bump that
  # silently needs a newer rustc fails here instead of in a user's `cargo install`.
  # The check name is kept static ("MSRV") so required-status-check branch
  # protection keeps working when the version is bumped — update the toolchain
  # below and the rust-version in Cargo.toml, not the job name.
  msrv:
    name: MSRV
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.actor == 'dependabot[bot]' }}
      - name: Check
        run: cargo check --workspace --locked

  # Supply-chain gate: license allow-list and RUSTSEC advisories. Catches a
  # Dependabot bump that pulls a GPL-incompatible or vulnerable crate.
  deny:
    name: cargo-deny
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # Coverage signal for reviews. Never blocks the pipeline — it reports, it
  # doesn't gate.
  coverage:
    name: Coverage
    needs: fmt
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.actor == 'dependabot[bot]' }}
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --locked --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
