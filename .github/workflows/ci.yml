name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Fast, no-compile formatting check that fails the pipeline in ~15s when
  # formatting is wrong, so we don't waste cache/runner time on the matrix.
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  check:
    name: Check (${{ matrix.os }})
    needs: fmt
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS is a release target, so it must be in the matrix — path
        # handling and the ~/Library config fallback only run here.
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # Keep cache writes restricted to main to avoid filling the 10 GB
          # GitHub Actions cache quota with short-lived PR branches.
          save-if: ${{ github.ref == 'refs/heads/main' }}
          # Persist cache even when clippy/tests fail so the next run starts
          # warm instead of recompiling everything from scratch.
          cache-on-failure: true

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --locked

  # Build against the declared MSRV so a dependency bump that silently needs a
  # newer rustc fails here instead of in a user's `cargo install`.
  msrv:
    name: MSRV (1.89)
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Check
        run: cargo check --workspace --locked

  # Supply-chain gate: license allow-list and RUSTSEC advisories. Catches a
  # Dependabot bump that pulls a GPL-incompatible or vulnerable crate.
  deny:
    name: cargo-deny
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # Coverage signal for reviews. Never blocks the pipeline — it reports, it
  # doesn't gate.
  coverage:
    name: Coverage
    needs: fmt
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --locked --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
